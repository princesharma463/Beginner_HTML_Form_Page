<!DOCTYPE html>
<html>
    <head>
        <title>Document</title>
    </head>
    <body>
        <h1>University Registration From</h1>
        <p>Please fill out the form!</p>
        <hr>

        <form>

            <h2>Personal Details</h2>

            <label for="First_Name">First_Name</label>
            <input type="text" name=" Users_First_Name" id="First_Name">

            <br> <br>

            <label for="surname">Last_Name</label>
            <input type="text" name="Users_Last_Name" id="surname">

            <br> <br>

            <label for="dob">DOB</label>
            <input type="date" name="Users_DOB" id="dob">

            <br> <br>

            <h3>Gender</h3>

            <label for="male">Male</label>
            <input type="radio" name="User_Gender" id="male" value="Male">         

            <label for="female">Female</label>
            <input type="radio" name="User_Gender" id="female" value="Female">

            <label for="others">Others</label>
            <input type="radio" name="User_Gender" id="others" value="others">

            <br> <br>

            <h3>Upload Yours Photo</h3>

            <label>Upload your Photos/images:</label>
            <input type="file" name="Users_Photo">

            <hr>

            <h2>Contact Information</h2>

            <label for="email">Email Address</label>
            <input type="email" name="User_Email_Address" id="email">

            <br> <br>

            <label for="phone">Contact Number</label>
            <input type="tel" name="Users_Contact_Number" id="phone">

            <br> <br>

            <label for="Address">Mailing Address</label>
            <textarea name="Users_Text_Address" id="Address" rows="7"cols="7"></textarea>

            <hr>

            <h2>Academic Information</h2>

            <label for="course">Select Your Course</label>
            <select name="Users_Course_Selection" id="course">
                <option value="Computer Science">Computer Science</option>
                <option value="mechanical">mechanical</option>
                <option value="Electrical">Electrical</option>
                <option value="Civil">Civil</option>
            </select>

            <h3>Extra Curricular Interests</h3>

            <label for="sports">Sports</label>
            <input type="checkbox" name="User_Curricular_Interests" id="sports" value="sports">

            <br> <br>

            <label for="m & a">Music and Arts</label>
            <input type="checkbox" name="User_Curricular_Interests" id="m & a" value="Music and Arts">

            <br> <br>

            <label for="t & c">Technology and Clubs</label>
            <input type="checkbox" name="User_Curricular_Interests" id="t & c" value="Technology and Clubs">

            <br> <br>

            <label for="volunter">Volunterring</label>
            <input type="checkbox" name="User_Curricular_Interests" id="volunter" value="Volunterring">

            <hr>

            <h2>Create Your Account</h2>

            <label for="passkey">Create your Password</label>
            <input type="password" id="User_Password" id="passkey">

            <br> <br>

            <label for="gender" >male</label>
            <input type="radio" name="Users_gen" id="gender">

            <label for="gender" >female</label>
            <input type="radio" name="Users_gen" id="gender">

            <label for="gender" >other</label>
            <input type="radio" name="Users_gen" id="gender" value="">
            <br><br>

            <input type="submit">
        </form>
    </body>
</html>
